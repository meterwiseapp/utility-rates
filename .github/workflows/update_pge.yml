name: PGE Auto/Manual Update
on:
  schedule:
    - cron: '0 12 1 * *' 
  workflow_dispatch: 
    inputs:
      dry_run:
        description: 'Dry Run'
        required: true
        type: boolean
        default: false
  # Trigger when a PDF is committed to the uploads folder
  push:
    paths:
      - 'pge_uploads/**.pdf'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      - name: Setup Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Run Automated Scraper
        run: python update_pge_rates.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Run Manual PDF Parser
        # This overwrites web data with the high-precision PDF data
        run: python parse_pge_manual.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit and Push
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config --global user.name 'PGE-Bot'
          git config --global user.email 'bot@meterwise.pro'
          git add pge_rates.json
          git commit -m "PG&E rate update: $(date)" || exit 0
          git push
